site_name: purecache
site_url: https://pure-python-system-design.github.io/purecache/
repo_url: https://github.com/pure-python-system-design/purecache
repo_name: pure-python-system-design/purecache

theme:
  name: material
  palette:
    scheme: slate
    primary: teal
    accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Decorator: decorators.md
  - Backends:
      - LRU: lru.md
  - Architecture: architecture.md
  - Advanced:
      - Cache Stampede: stampede.md
  - API Reference: api.md
